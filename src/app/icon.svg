<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Deep black background -->
  <rect width="32" height="32" rx="3" fill="#050505"/>
  <!-- Outer gold border — art deco frame -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="2" fill="none" stroke="#C8A96E" stroke-width="0.8" opacity="0.6"/>
  <!-- Vertical beam — Physical Dynamism motif -->
  <rect x="15.2" y="4" width="1.6" height="19" fill="#C8A96E"/>
  <!-- Glow bloom at beam top -->
  <ellipse cx="16" cy="5.5" rx="3" ry="2" fill="#E8D5A8" opacity="0.3"/>
  <!-- Horizontal city baseline -->
  <rect x="5" y="24" width="22" height="1" fill="#C8A96E" opacity="0.7"/>
  <!-- Small city block silhouettes -->
  <rect x="5" y="20" width="3" height="4" fill="#C8A96E" opacity="0.35"/>
  <rect x="9" y="21" width="2" height="3" fill="#C8A96E" opacity="0.35"/>
  <rect x="21" y="21" width="2" height="3" fill="#C8A96E" opacity="0.35"/>
  <rect x="24" y="19" width="3" height="5" fill="#C8A96E" opacity="0.35"/>
</svg>
